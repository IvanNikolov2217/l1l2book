<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ridge Regression — Interactive</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, sans-serif;
    background: #ffffff;
    color: #1a1814;
    padding: 1.25rem;
    font-size: 14px;
  }
  .caption {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: #8c897f;
    margin-bottom: .85rem;
  }
  .tab-row { display: flex; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; }
  .tab-btn {
    padding: 5px 14px;
    border-radius: 4px;
    border: 1px solid #dedad3;
    background: #f0ede6;
    font-size: 13px;
    cursor: pointer;
    color: #5a5650;
    font-family: inherit;
    font-weight: 500;
    transition: background .15s, color .15s, border-color .15s;
  }
  .tab-btn.active { background: #1a4a8a; color: #fff; border-color: #1a4a8a; }
  .tab-btn:hover:not(.active) { background: #dedad3; }
  .chart-wrap { position: relative; height: 260px; }
  .note {
    margin-top: .75rem;
    font-size: 12.5px;
    color: #8c897f;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div class="caption">Ridge regression — predicted salary vs age</div>

<div class="tab-row">
  <button class="tab-btn active" id="r0" onclick="setRidge(0)">λ = 0 (no regularization)</button>
  <button class="tab-btn" id="r1" onclick="setRidge(1)">λ = 0.02</button>
  <button class="tab-btn" id="r2" onclick="setRidge(2)">λ = 0.10</button>
</div>

<div class="chart-wrap">
  <canvas id="ridgeChart" role="img" aria-label="Line chart showing Ridge regression salary predictions for different lambda values against training data points.">Ridge regression predictions chart.</canvas>
</div>

<p class="note">
  Observe how increasing λ smooths the prediction curve. At λ = 0.02 the wild oscillations of the unregularized model almost completely disappear, producing a smooth, generalizable prediction.
</p>

<script>
const ages = [];
for (let a = 18; a <= 72; a += 0.5) ages.push(a);

const trainX = [25,55,27,35,60,65,45,40,50,30];
const trainY = [85,280,90,130,250,240,220,180,270,110];

const means = [43.2, 2045, 104231, 5610457, 314153953];
const stds  = [14.1, 1259, 89653, 5975341, 389179640];

function scale(x) {
  const f = [x, x*x, x*x*x, x*x*x*x, x*x*x*x*x];
  return f.map((v, i) => (v - means[i]) / stds[i]);
}

function predict(coeffs, x) {
  const [a, w1, w2, w3, w4, w5] = coeffs;
  const s = scale(x);
  return a + w1*s[0] + w2*s[1] + w3*s[2] + w4*s[3] + w5*s[4];
}

// [a, w1, w2, w3, w4, w5]
const ridgeCoeffs = [
  [216.5, -32622.6, 135402.7, -215493.1, 155314.6, -42558.8], // λ=0
  [216.5, 97.8, 36.6, -8.5, -35.0, -44.6],                    // λ=0.02
  [216.5, 56.5, 28.1, 3.7, -15.1, -28.4],                     // λ=0.10
];

const trainPts = trainX.map((x, i) => ({ x, y: trainY[i] }));

const ctx = document.getElementById('ridgeChart').getContext('2d');
const chart = new Chart(ctx, {
  type: 'line',
  data: {
    datasets: [
      {
        label: 'Prediction',
        data: ages.map(a => ({ x: a, y: Math.max(0, Math.min(340, predict(ridgeCoeffs[0], a))) })),
        borderColor: '#1a4a8a',
        borderWidth: 2.5,
        pointRadius: 0,
        tension: 0.3,
      },
      {
        label: 'Training data',
        data: trainPts,
        type: 'scatter',
        backgroundColor: '#c0392b',
        pointRadius: 6,
        pointHoverRadius: 8,
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: {
        display: true,
        labels: { font: { size: 12 }, boxWidth: 14, padding: 12 }
      }
    },
    scales: {
      x: {
        type: 'linear', min: 18, max: 72,
        title: { display: true, text: 'Age (years)', font: { size: 12 } },
        grid: { color: 'rgba(0,0,0,.06)' },
        ticks: { color: '#8c897f', font: { size: 11 } }
      },
      y: {
        min: 0, max: 340,
        title: { display: true, text: "Salary ($'000s)", font: { size: 12 } },
        grid: { color: 'rgba(0,0,0,.06)' },
        ticks: { color: '#8c897f', font: { size: 11 } }
      }
    }
  }
});

const btns = ['r0', 'r1', 'r2'];
function setRidge(i) {
  btns.forEach((id, j) => document.getElementById(id).classList.toggle('active', i === j));
  chart.data.datasets[0].data = ages.map(a => ({
    x: a,
    y: Math.max(0, Math.min(340, predict(ridgeCoeffs[i], a)))
  }));
  chart.update();
}
</script>
</body>
</html>
