<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lasso Regression — Interactive</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, sans-serif;
    background: #ffffff;
    color: #1a1814;
    padding: 1.25rem;
    font-size: 14px;
  }
  .caption {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: #8c897f;
    margin-bottom: .85rem;
  }
  .tab-row { display: flex; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; }
  .tab-btn {
    padding: 5px 14px;
    border-radius: 4px;
    border: 1px solid #dedad3;
    background: #f0ede6;
    font-size: 13px;
    cursor: pointer;
    color: #5a5650;
    font-family: inherit;
    font-weight: 500;
    transition: background .15s, color .15s, border-color .15s;
  }
  .tab-btn.active { background: #9b2335; color: #fff; border-color: #9b2335; }
  .tab-btn:hover:not(.active) { background: #dedad3; }
  .chart-wrap { position: relative; height: 260px; }
  .note {
    margin-top: .75rem;
    font-size: 12.5px;
    color: #8c897f;
    line-height: 1.5;
  }
  .zero-legend {
    display: flex;
    gap: 1rem;
    margin-top: .6rem;
    font-size: 12px;
    color: #5a5650;
    flex-wrap: wrap;
  }
  .zero-tag {
    background: #f0ede6;
    border: 1px solid #dedad3;
    border-radius: 4px;
    padding: 2px 8px;
    font-family: monospace;
    font-size: 12px;
  }
  .zero-tag span { color: #b0cce8; font-weight: 700; }
</style>
</head>
<body>

<div class="caption">Lasso regression — predicted salary vs age</div>

<div class="tab-row">
  <button class="tab-btn active" id="l0" onclick="setLasso(0)">λ = 0.02</button>
  <button class="tab-btn" id="l1" onclick="setLasso(1)">λ = 0.10</button>
  <button class="tab-btn" id="l2" onclick="setLasso(2)">λ = 1.00</button>
</div>

<div class="chart-wrap">
  <canvas id="lassoChart" role="img" aria-label="Line chart showing Lasso regression salary predictions for different lambda values against training data points.">Lasso regression predictions chart.</canvas>
</div>

<div class="zero-legend" id="zeroLegend">
  Active weights: <span id="activeWeights"></span>
</div>

<p class="note">
  Observe how the curve simplifies as λ increases. At λ = 1, the model uses only x and x⁴ — a much simpler model than the original 5th-degree polynomial.
</p>

<script>
const ages = [];
for (let a = 18; a <= 72; a += 0.5) ages.push(a);

const trainX = [25,55,27,35,60,65,45,40,50,30];
const trainY = [85,280,90,130,250,240,220,180,270,110];

const means = [43.2, 2045, 104231, 5610457, 314153953];
const stds  = [14.1, 1259, 89653, 5975341, 389179640];

function scale(x) {
  const f = [x, x*x, x*x*x, x*x*x*x, x*x*x*x*x];
  return f.map((v, i) => (v - means[i]) / stds[i]);
}

function predict(coeffs, x) {
  const [a, w1, w2, w3, w4, w5] = coeffs;
  const s = scale(x);
  return a + w1*s[0] + w2*s[1] + w3*s[2] + w4*s[3] + w5*s[4];
}

// [a, w1, w2, w3, w4, w5]
const lassoCoeffs = [
  [216.5, -646.4, 2046.6, 0, -3351.0, 2007.9],  // λ=0.02
  [216.5, 355.4, 0, -494.8, 0, 196.5],           // λ=0.10
  [216.5, 147.4, 0, 0, -99.3, 0],                // λ=1.00
];

const featureNames = ['x', 'x²', 'x³', 'x⁴', 'x⁵'];

const trainPts = trainX.map((x, i) => ({ x, y: trainY[i] }));

const ctx = document.getElementById('lassoChart').getContext('2d');
const chart = new Chart(ctx, {
  type: 'line',
  data: {
    datasets: [
      {
        label: 'Prediction',
        data: ages.map(a => ({ x: a, y: Math.max(0, Math.min(340, predict(lassoCoeffs[0], a))) })),
        borderColor: '#9b2335',
        borderWidth: 2.5,
        pointRadius: 0,
        tension: 0.3,
      },
      {
        label: 'Training data',
        data: trainPts,
        type: 'scatter',
        backgroundColor: '#5a5650',
        pointRadius: 6,
        pointHoverRadius: 8,
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: {
        display: true,
        labels: { font: { size: 12 }, boxWidth: 14, padding: 12 }
      }
    },
    scales: {
      x: {
        type: 'linear', min: 18, max: 72,
        title: { display: true, text: 'Age (years)', font: { size: 12 } },
        grid: { color: 'rgba(0,0,0,.06)' },
        ticks: { color: '#8c897f', font: { size: 11 } }
      },
      y: {
        min: 0, max: 340,
        title: { display: true, text: "Salary ($'000s)", font: { size: 12 } },
        grid: { color: 'rgba(0,0,0,.06)' },
        ticks: { color: '#8c897f', font: { size: 11 } }
      }
    }
  }
});

function updateWeightDisplay(i) {
  const weights = lassoCoeffs[i].slice(1); // skip bias
  const active = weights
    .map((w, j) => w !== 0 ? `<span class="zero-tag">${featureNames[j]}</span>` : null)
    .filter(Boolean)
    .join(' ');
  document.getElementById('activeWeights').innerHTML = active || 'none';
}

const btns = ['l0', 'l1', 'l2'];
function setLasso(i) {
  btns.forEach((id, j) => document.getElementById(id).classList.toggle('active', i === j));
  chart.data.datasets[0].data = ages.map(a => ({
    x: a,
    y: Math.max(0, Math.min(340, predict(lassoCoeffs[i], a)))
  }));
  chart.update();
  updateWeightDisplay(i);
}

updateWeightDisplay(0);
</script>
</body>
</html>
