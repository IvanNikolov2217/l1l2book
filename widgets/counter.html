<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: sans-serif;
        margin: 0;
        padding: 0.6rem;
      }
      button {
        font-size: 1rem;
        margin: 0 0.2rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <p>Counter: <strong id="count">0</strong></p>
    <button id="dec">−</button>
    <button id="inc">+</button>
    <button id="reset">Reset</button>
    <script>
      let n = 0;
      const el = document.getElementById("count");
      const upd = () => (el.textContent = n);
      dec.onclick = () => {
        n--;
        upd();
      };
      inc.onclick = () => {
        n++;
        upd();
      };
      reset.onclick = () => {
        n = 0;
        upd();
      };
    </script>
  </body>
</html>
